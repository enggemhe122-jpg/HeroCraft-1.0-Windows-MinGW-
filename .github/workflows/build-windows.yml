name: Build Windows Executable

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat

      - name: Install dependencies with vcpkg
        run: |
          .\vcpkg\vcpkg install zlib:x64-windows opengl:x64-windows

      - name: Install MinGW and CMake
        run: |
          choco install mingw cmake -y

      - name: Configure project with CMake
        run: |
          mkdir build
          cd build
          cmake -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release ..

      - name: Build project
        run: |
          cd build
          cmake --build . --config Release

      - name: Collect files for packaging
        run: |
          mkdir -p release/HeroCraft
          xcopy textures release\HeroCraft\textures\ /E /I /Y
          xcopy fonts release\HeroCraft\fonts\ /E /I /Y
          xcopy mods release\HeroCraft\mods\ /E /I /Y

      - name: Create ZIP package
        run: |
          cd release
          powershell -Command "Compress-Archive -Path HeroCraft -DestinationPath HeroCraft-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeroCraft-Windows
          path: release/HeroCraft-Windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release/HeroCraft-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
