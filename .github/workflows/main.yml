name: HeroCraft 1.0 Final Build
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          choco install cmake ninja mingw -y

      - name: Build HeroCraft 1.0
        shell: cmd
        run: |
          mkdir build && cd build
          cmake .. -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DENABLE_GETTEXT=0 -DENABLE_CURSES=0
          mingw32-make -j2

      - name: Upload HeroCraft EXE
        uses: actions/upload-artifact@v4
        with:
          name: HeroCraft-1.0-Windows
          path: bin/
