      - name: Force Build HeroCraft 1.0
        shell: msys2 {0}
        run: |
          mkdir -p misc
          echo '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><assembly xmlns="urn:schemas-microsoft-com:asm.v1" manifestVersion="1.0"></assembly>' > misc/luanti.exe.manifest
          
          mkdir -p build && cd build
          cmake .. -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_GETTEXT=0 \
            -DENABLE_CURSES=0 \
            -DBUILD_UNITTESTS=0 \
            -DENABLE_SYSTEM_GMP=0
          
          # محاولة البناء وإظهار الملفات الناتجة
          ninja
          ls -R bin/ || ls -R . # كشف مكان ملف exe إذا نجح البناء

      - name: Upload HeroCraft EXE
        uses: actions/upload-artifact@v4
        with:
          name: HeroCraft-Windows
          path: |
            build/**/*.exe
            build/bin/*.exe
          if-no-files-found: error # سيعطيك خطأ واضح إذا لم يجد الملف لتعرف السبب
