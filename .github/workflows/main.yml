name: HeroCraft 1.0 Ultimate Builder
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        run: |
          git clone https://github.com
          .\vcpkg\bootstrap-vcpkg.bat

      - name: Install Dependencies & Build
        run: |
          # هذا الأمر سيقوم بتحميل كل المكتبات وبناء اللعبة في خطوة واحدة قوية
          .\vcpkg\vcpkg install luanti:x64-windows

      - name: Upload HeroCraft EXE
        uses: actions/upload-artifact@v4
        with:
          name: HeroCraft-1.0-Final
          path: vcpkg/installed/x64-windows/bin/
