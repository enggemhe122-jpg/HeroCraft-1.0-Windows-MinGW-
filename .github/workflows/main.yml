name: HeroCraft 1.0 Final Build
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Build Tools & Libraries
        run: |
          # تحميل كل المكتبات الناقصة دفعة واحدة
          choco install cmake ninja mingw zlib-ng curl sqlite openssl -y

      - name: Build HeroCraft 1.0
        shell: cmd
        run: |
          mkdir build && cd build
          # إخبار CMake بمكان المكتبات لضمان عدم حدوث خطأ ZLIB مجدداً
          cmake .. -G "MinGW Makefiles" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DENABLE_GETTEXT=0 ^
            -DENABLE_CURSES=0 ^
            -DZLIB_INCLUDE_DIR="C:/ProgramData/chocolatey/lib/zlib-ng/include" ^
            -DZLIB_LIBRARY="C:/ProgramData/chocolatey/lib/zlib-ng/lib/zlib.lib"
          mingw32-make -j2

      - name: Upload HeroCraft EXE
        uses: actions/upload-artifact@v4
        with:
          name: HeroCraft-1.0-Windows
          path: bin/
