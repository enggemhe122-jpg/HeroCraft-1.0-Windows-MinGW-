name: Build Windows Executable

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW and CMake
        run: |
          choco install mingw cmake -y

      - name: Setup vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat

      - name: Configure project with CMake
        run: |
          mkdir build
          cd build
          cmake -G "Unix Makefiles" -DCMAKE_TOOLCHAIN_FILE=../vcpkg/scripts/buildsystems/vcpkg.cmake -DCMAKE_BUILD_TYPE=Release ..

      - name: Build project
        run: |
          cd build
          cmake --build . --config Release

      - name: Collect files for packaging
        run: |
          mkdir -p release/HeroCraft
          copy build\HeroCraft.exe release\HeroCraft\
          xcopy textures release\HeroCraft\textures\ /E /I
          xcopy fonts release\HeroCraft\fonts\ /E /I
          xcopy mods release\HeroCraft\mods\ /E /I
          copy herocraft.conf.example release\HeroCraft\

      - name: Create ZIP package
        run: |
          cd release
          powershell -Command "Compress-Archive -Path HeroCraft -DestinationPath HeroCraft-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: HeroCraft-Windows
          path: release/HeroCraft-Windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release/HeroCraft-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
