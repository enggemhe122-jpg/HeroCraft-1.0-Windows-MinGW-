name: HeroCraft 1.0 Windows Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build HeroCraft 1.0 (Windows MinGW)
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-libogg
            mingw-w64-x86_64-libvorbis
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-gettext
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-luajit
            mingw-w64-x86_64-leveldb
            mingw-w64-x86_64-openal
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-SDL2

      - name: Build HeroCraft 1.0
        shell: msys2 {0}
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_CLIENT=TRUE \
            -DBUILD_SERVER=FALSE \
            -DBUILD_UNITTESTS=FALSE \
            -DENABLE_GETTEXT=TRUE \
            -DENABLE_SOUND=TRUE \
            -DENABLE_CURL=TRUE \
            -DENABLE_FREETYPE=TRUE \
            -DENABLE_LEVELDB=TRUE \
            -DRUN_IN_PLACE=TRUE
          ninja

      - name: Prepare Artifacts
        shell: msys2 {0}
        run: |
          mkdir -p dist
          # Copy the executable
          cp build/bin/herocraft.exe dist/
          
          # Copy necessary DLLs from MSYS2 environment
          cp /mingw64/bin/libgcc_s_seh-1.dll dist/
          cp /mingw64/bin/libstdc++-6.dll dist/
          cp /mingw64/bin/libwinpthread-1.dll dist/
          cp /mingw64/bin/zlib1.dll dist/
          cp /mingw64/bin/libzstd.dll dist/
          cp /mingw64/bin/libcurl-4.dll dist/
          cp /mingw64/bin/libintl-8.dll dist/
          cp /mingw64/bin/libfreetype-6.dll dist/
          cp /mingw64/bin/libsqlite3-0.dll dist/
          cp /mingw64/bin/lua51.dll dist/
          cp /mingw64/bin/libopenal-1.dll dist/
          cp /mingw64/bin/SDL2.dll dist/
          
          # Copy game data
          cp -r builtin dist/
          cp -r games dist/
          cp -r locale dist/
          cp -r textures dist/
          cp herocraft.conf.example dist/herocraft.conf

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeroCraft-1.0-Windows-MinGW
          path: dist/
